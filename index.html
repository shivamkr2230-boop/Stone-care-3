<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RN Herbal — पथरी का आयुर्वेदिक इलाज | Stone-Go & Stone Crash</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Mukta:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT & RESET
============================================================ */
:root{
  --g1:#1b5e3b; --g2:#2d7a55; --g3:#52b788;
  --red:#b5341c; --gold:#c9980a; --dark:#111;
  --gray:#555; --lgray:#f4f4f2; --white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Mukta',sans-serif;color:var(--dark);background:#fff;overflow-x:hidden;}
img{max-width:100%;display:block;}
a{text-decoration:none;}

/* ============================================================
   UTILITY
============================================================ */
.sec{padding:80px 5%;}
.sec-label{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--g2);font-weight:700;margin-bottom:8px;}
.sec-title{font-family:'Playfair Display',serif;font-size:2.1rem;line-height:1.25;margin-bottom:10px;}
.sec-sub{color:var(--gray);font-size:.97rem;line-height:1.75;max-width:580px;}
.divider{width:50px;height:3px;background:var(--g2);margin:14px 0 30px;}
.center{text-align:center;}
.center .divider{margin:14px auto 30px;}
.center .sec-sub{margin:0 auto;}
.tag{display:inline-block;background:var(--g1);color:#fff;font-size:.68rem;padding:3px 10px;border-radius:2px;letter-spacing:1.5px;text-transform:uppercase;}

/* 3-D GREEN BUTTON */
.btn-3d{
  display:inline-block;
  background:linear-gradient(180deg,#2ecc71 0%,#27ae60 45%,#1a7a43 100%);
  color:#fff;padding:15px 38px;border-radius:5px;
  font-size:1rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  box-shadow:0 7px 0 #0d4a25,0 10px 20px rgba(0,0,0,.28);
  transform:translateY(0);transition:all .12s ease;
  border:none;cursor:pointer;animation:pulse3d 2.8s infinite;
}
.btn-3d:hover{transform:translateY(3px);box-shadow:0 4px 0 #0d4a25,0 6px 12px rgba(0,0,0,.22);}
.btn-3d:active{transform:translateY(7px);box-shadow:0 0 0 #0d4a25;}
@keyframes pulse3d{
  0%,100%{box-shadow:0 7px 0 #0d4a25,0 10px 20px rgba(0,0,0,.28),0 0 0 0 rgba(39,174,96,0);}
  50%{box-shadow:0 7px 0 #0d4a25,0 10px 20px rgba(0,0,0,.28),0 0 0 16px rgba(39,174,96,.12);}
}
.btn-red{
  display:inline-block;
  background:linear-gradient(180deg,#e74c3c 0%,#c0392b 50%,#922b21 100%);
  color:#fff;padding:13px 32px;border-radius:5px;
  font-size:.95rem;font-weight:700;letter-spacing:.5px;
  box-shadow:0 6px 0 #6e1e15,0 9px 18px rgba(0,0,0,.25);
  transform:translateY(0);transition:all .12s;border:none;cursor:pointer;
}
.btn-red:hover{transform:translateY(3px);box-shadow:0 3px 0 #6e1e15,0 5px 10px rgba(0,0,0,.2);}

/* FADE-IN */
.fi{opacity:0;transform:translateY(28px);transition:opacity .65s,transform .65s;}
.fi.on{opacity:1;transform:translateY(0);}

/* ============================================================
   NAVBAR
============================================================ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:999;
  background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
  border-bottom:1px solid #e4e4e4;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 5%;
  box-shadow:0 2px 14px rgba(0,0,0,.07);
}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-brand-circle{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;
  box-shadow:0 2px 8px rgba(45,106,79,.4);
}
.nav-name{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--g1);font-weight:700;line-height:1.1;}
.nav-name small{display:block;font-family:'Mukta',sans-serif;font-size:.65rem;color:var(--gray);letter-spacing:1.5px;font-weight:400;text-transform:uppercase;}
.nav-links{display:flex;align-items:center;gap:22px;list-style:none;}
.nav-links a{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dark);transition:color .2s;}
.nav-links a:hover{color:var(--g2);}
.nav-buy{
  background:linear-gradient(135deg,var(--red),#e74c3c);
  color:#fff;padding:9px 22px;border-radius:4px;
  font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  box-shadow:0 4px 14px rgba(181,52,28,.35);transition:all .2s;
}
.nav-buy:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(181,52,28,.45);}

/* ============================================================
   SECTION 1 — HERO (img1 as bg overlay)
============================================================ */
#s-hero{
  min-height:100vh;padding-top:76px;
  position:relative;overflow:hidden;
  background:#fff;
}
.hero-bg{
  position:absolute;right:0;top:0;bottom:0;width:52%;
  background:url('1000034370.png') center/cover no-repeat;
  opacity:.12;
}
.hero-inner{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  min-height:calc(100vh - 76px);padding:60px 5% 40px;
  flex-wrap:wrap;gap:40px;
}
.hero-left{max-width:480px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#e8f5ee;color:var(--g1);
  font-size:.72rem;font-weight:700;letter-spacing:2px;
  padding:6px 14px;border-radius:2px;border-left:3px solid var(--g2);
  margin-bottom:18px;text-transform:uppercase;
}
.hero-h1{font-family:'Playfair Display',serif;font-size:3rem;line-height:1.18;margin-bottom:14px;}
.hero-h1 span{color:var(--g2);}
.hero-hindi{font-size:1.1rem;font-weight:700;color:var(--red);line-height:1.65;margin-bottom:20px;}
.hero-sub{font-size:.97rem;color:var(--gray);line-height:1.75;margin-bottom:28px;}
.hero-stats{display:flex;gap:24px;margin-top:30px;flex-wrap:wrap;}
.hstat{text-align:center;}
.hstat-n{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--g1);}
.hstat-l{font-size:.72rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
.hero-right{display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;justify-content:center;}
.prod-card{
  background:#fff;border-radius:10px;padding:22px 18px;width:185px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.1);border:1px solid #e8e8e8;
  transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden;
}
.prod-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--g1),var(--g3));
}
.prod-card:hover{transform:translateY(-8px);box-shadow:0 16px 48px rgba(0,0,0,.15);}
.prod-card img{width:110px;height:150px;object-fit:contain;margin:0 auto 12px;}
.prod-card h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:4px;}
.prod-card p{font-size:.75rem;color:var(--gray);margin-bottom:8px;}
.prod-badge{font-size:.65rem;background:var(--g1);color:#fff;padding:2px 8px;border-radius:10px;display:inline-block;}
.hero-scroll{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);animation:bounce .9s infinite alternate;}
@keyframes bounce{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(8px);}}

/* ============================================================
   SECTION 2 — PROBLEM (img1 bg)
============================================================ */
#s-problem{
  background:var(--lgray);position:relative;overflow:hidden;
}
.prob-bg-img{
  position:absolute;right:0;top:0;bottom:0;width:40%;
  background:url('1000034370.png') center/cover no-repeat;
  opacity:.07;
}
.prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;flex-wrap:wrap;}
.prob-img-col img{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:100%;}
.prob-cards{display:flex;flex-direction:column;gap:14px;}
.prob-card{
  background:#fff;border-radius:6px;padding:18px 20px;
  border-left:4px solid var(--red);
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  display:flex;gap:14px;align-items:flex-start;
}
.prob-icon{font-size:1.5rem;flex-shrink:0;}
.prob-card h4{font-size:.95rem;font-weight:700;color:var(--red);margin-bottom:4px;}
.prob-card p{font-size:.83rem;color:var(--gray);line-height:1.6;}

/* ============================================================
   SECTION 3 — GALLBLADDER EDUCATION (img2 bg)
============================================================ */
#s-gallbladder{
  position:relative;overflow:hidden;
  background:#fff;
}
.gb-bg{
  position:absolute;left:0;top:0;bottom:0;width:100%;
  background:url('1000034369.png') center/cover no-repeat;
  opacity:.05;
}
.gb-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center;}
.gb-img img{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.gb-points{display:flex;flex-direction:column;gap:16px;margin-top:20px;}
.gb-point{display:flex;gap:14px;align-items:flex-start;}
.gb-num{
  width:34px;height:34px;border-radius:50%;background:var(--g1);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;
  font-size:.85rem;flex-shrink:0;
}
.gb-point p{font-size:.9rem;color:var(--gray);line-height:1.65;padding-top:6px;}

/* ============================================================
   SECTION 4 — KIDNEY STONE DETAIL (img3 bg)
============================================================ */
#s-kidney{
  background:var(--lgray);position:relative;overflow:hidden;
}
.kid-bg{
  position:absolute;right:0;top:0;bottom:0;width:45%;
  background:url('1000034368.png') center/cover no-repeat;
  opacity:.08;
}
.kid-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center;}
.kid-img img{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;}
.fact-box{
  background:#fff;border-radius:6px;padding:18px 16px;text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.06);border-top:3px solid var(--g2);
}
.fact-box .num{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--g1);font-weight:700;}
.fact-box p{font-size:.78rem;color:var(--gray);margin-top:4px;}

/* ============================================================
   SECTION 5 — PAIN EXPLAINED (img4 bg)
============================================================ */
#s-pain{
  position:relative;overflow:hidden;
  background:#fff;
}
.pain-full-bg{
  position:absolute;inset:0;
  background:url('1000034367.png') center/cover no-repeat;
  opacity:.06;
}
.pain-inner{position:relative;z-index:2;}
.pain-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px;margin-top:30px;}
.pain-card{
  background:#fff;border-radius:8px;padding:26px 22px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  border-bottom:3px solid var(--g2);text-align:center;
  transition:transform .25s,box-shadow .25s;
}
.pain-card:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(0,0,0,.12);}
.pain-card .icon{font-size:2rem;margin-bottom:12px;}
.pain-card h4{font-size:.95rem;font-weight:700;margin-bottom:8px;}
.pain-card p{font-size:.82rem;color:var(--gray);line-height:1.65;}
.pain-img-row{display:flex;gap:20px;margin-top:40px;flex-wrap:wrap;justify-content:center;}
.pain-img-row img{width:calc(50% - 10px);min-width:260px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.1);object-fit:cover;max-height:220px;}

/* ============================================================
   SECTION 6 — SURGERY vs HERBAL (img5 bg)
============================================================ */
#s-surgery{
  position:relative;overflow:hidden;
  background:var(--lgray);
}
.surg-bg{
  position:absolute;left:0;top:0;bottom:0;width:50%;
  background:url('1000034366.png') center/cover no-repeat;
  opacity:.1;
}
.surg-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start;}
.surg-img img{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);border:3px solid #e4e4e4;}
.compare-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:.88rem;}
.compare-table th{padding:12px 16px;text-align:left;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;}
.compare-table th:nth-child(2){background:var(--red);color:#fff;border-radius:4px 0 0 0;}
.compare-table th:nth-child(3){background:var(--g1);color:#fff;border-radius:0 4px 0 0;}
.compare-table td{padding:11px 16px;border-bottom:1px solid #e8e8e8;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table td:first-child{font-weight:600;color:var(--dark);}
.compare-table td.bad{color:var(--red);}
.compare-table td.good{color:var(--g2);font-weight:700;}
.compare-table tbody tr:nth-child(odd){background:rgba(82,183,136,.04);}

/* ============================================================
   SECTION 7 — DOCTOR / TRUST (img6 bg)
============================================================ */
#s-trust{
  position:relative;overflow:hidden;background:#fff;
}
.trust-bg{
  position:absolute;inset:0;
  background:url('1000034365.png') center top/cover no-repeat;
  opacity:.07;
}
.trust-inner{position:relative;z-index:2;}
.trust-badges{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-top:36px;}
.tbadge{
  background:#fff;border-radius:8px;padding:28px 24px;width:200px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #e8e8e8;
}
.tbadge .icon{font-size:2.2rem;margin-bottom:10px;}
.tbadge h4{font-size:.9rem;font-weight:700;margin-bottom:6px;color:var(--g1);}
.tbadge p{font-size:.78rem;color:var(--gray);line-height:1.6;}
.trust-img-row{display:flex;gap:20px;margin-top:44px;justify-content:center;flex-wrap:wrap;}
.trust-img-row img{border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.1);width:280px;object-fit:cover;max-height:200px;}

/* ============================================================
   SECTION 8 — KIDNEY ANATOMY EDUCATION (img7)
============================================================ */
#s-anatomy{
  background:var(--lgray);position:relative;overflow:hidden;
}
.anat-bg{
  position:absolute;right:0;top:0;bottom:0;width:40%;
  background:url('1000034364.png') center/cover no-repeat;
  opacity:.07;
}
.anat-inner{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center;}
.anat-img img{border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.anat-list{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.anat-item{
  background:#fff;border-radius:6px;padding:16px 20px;
  display:flex;gap:14px;align-items:flex-start;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.anat-dot{
  width:10px;height:10px;border-radius:50%;background:var(--g2);
  flex-shrink:0;margin-top:6px;
}
.anat-item p{font-size:.87rem;color:var(--gray);line-height:1.65;}
.anat-item strong{color:var(--dark);}

/* ============================================================
   COMBO / PRICING SECTION
============================================================ */
#s-combo{
  background:#fff;
  position:relative;overflow:hidden;
}
.combo-ribbon{
  position:absolute;top:0;right:0;
  background:var(--red);color:#fff;font-size:.72rem;font-weight:700;
  padding:8px 40px;transform:rotate(0deg);letter-spacing:2px;
}
.combo-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.combo-img-wrap{position:relative;text-align:center;}
.combo-img-wrap img{border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,.14);max-width:340px;width:100%;}
.combo-sticker{
  position:absolute;top:-16px;right:-16px;
  background:var(--gold);color:#fff;font-weight:700;font-size:.8rem;
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
  box-shadow:0 4px 16px rgba(201,152,10,.4);
  animation:spin-badge 4s linear infinite;
}
@keyframes spin-badge{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.price-block{margin:20px 0;}
.price-orig{font-size:.95rem;color:#aaa;text-decoration:line-through;}
.price-disc{font-size:3rem;font-weight:700;color:var(--red);line-height:1;}
.price-save{
  display:inline-block;background:#fff3cd;color:#856404;
  font-size:.82rem;padding:4px 12px;border-radius:3px;margin-top:6px;font-weight:600;
}
.includes{margin:20px 0;display:flex;flex-direction:column;gap:8px;}
.inc-item{display:flex;gap:10px;align-items:center;font-size:.9rem;}
.inc-item span{color:var(--g2);font-weight:700;font-size:1rem;}
.guarantee{
  background:#e8f5ee;border-radius:6px;padding:14px 18px;
  display:flex;gap:12px;align-items:center;margin-top:20px;
}
.guarantee .icon{font-size:1.8rem;}
.guarantee p{font-size:.85rem;line-height:1.6;color:var(--g1);font-weight:600;}

/* ============================================================
   BEFORE / AFTER
============================================================ */
#s-ba{background:var(--lgray);}
.ba-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:24px;align-items:center;margin-top:32px;}
.ba-card{border-radius:10px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.1);}
.ba-card img{width:100%;height:250px;object-fit:cover;}
.ba-label{padding:18px 20px;font-weight:700;font-size:.95rem;}
.ba-label.before{background:#ffeaea;color:var(--red);}
.ba-label.after{background:#e8f5ee;color:var(--g1);}
.ba-label ul{margin-top:6px;padding-left:16px;}
.ba-label ul li{font-size:.82rem;font-weight:400;color:var(--gray);margin-top:3px;}
.ba-arrow{font-size:3rem;color:var(--g2);text-align:center;font-weight:900;}

/* ============================================================
   HOW IT WORKS
============================================================ */
#s-how{background:#fff;}
.steps-row{display:flex;gap:0;flex-wrap:wrap;margin-top:32px;position:relative;}
.steps-row::before{
  content:'';position:absolute;top:34px;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,var(--g3),var(--g1));
  z-index:0;
}
.step{
  flex:1;min-width:160px;text-align:center;padding:0 16px;
  position:relative;z-index:1;
}
.step-circle{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--g2),var(--g1));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;margin:0 auto 14px;
  box-shadow:0 4px 16px rgba(45,106,79,.35);
  border:3px solid #fff;
}
.step h4{font-size:.92rem;font-weight:700;margin-bottom:6px;}
.step p{font-size:.8rem;color:var(--gray);line-height:1.6;}

/* INGREDIENTS */
#s-ingredients{background:var(--lgray);}
.ing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:30px;}
.ing-card{
  background:#fff;border-radius:8px;padding:24px 20px;text-align:center;
  box-shadow:0 3px 14px rgba(0,0,0,.07);
  transition:transform .25s;
}
.ing-card:hover{transform:translateY(-5px);}
.ing-card .herb{font-size:2rem;margin-bottom:10px;}
.ing-card h4{font-size:.95rem;font-weight:700;color:var(--g1);margin-bottom:6px;}
.ing-card p{font-size:.8rem;color:var(--gray);line-height:1.6;}

/* TESTIMONIALS */
#s-testimonials{background:#fff;}
.t-slider{display:flex;gap:18px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory;}
.t-slider::-webkit-scrollbar{height:4px;}
.t-slider::-webkit-scrollbar-thumb{background:var(--g2);border-radius:2px;}
.t-card{
  min-width:280px;flex-shrink:0;scroll-snap-align:start;
  background:#fff;border-radius:10px;padding:24px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #eee;
}
.t-vid{
  background:linear-gradient(135deg,#e8f5ee,#c8e6c9);
  border-radius:8px;height:90px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;cursor:pointer;
}
.play{
  width:44px;height:44px;border-radius:50%;
  background:var(--g1);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
